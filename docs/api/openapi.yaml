openapi: 3.0.3
info:
  title: API de Datos Meteorológicos
  version: "1.2.0"
  description: >
    API educativa con Spring Boot, JWT y control de acceso por roles.
    Sincronizada con WeatherController real:
    - Base Path: /api/clima
    - Gestión de ciudades y consulta de clima actual.

servers:
  - url: http://localhost:9091
    description: Local

tags:
  - name: Auth
    description: Autenticación y registro de usuarios
  - name: Meteorologia
    description: Operaciones de clima y ciudades (WeatherController)
  - name: Users
    description: Gestión de usuarios (Solo ADMIN)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ───────────────────────────────────────────────────────────────────
    SigninRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: alice.johnson@example.com }
        password: { type: string, example: password123 }

    SignUpRequest:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName: { type: string, example: Alice }
        lastName: { type: string, example: Johnson }
        email: { type: string, format: email, example: alice.johnson@example.com }
        password: { type: string, example: password123 }

    JwtAuthenticationResponse:
      type: object
      properties:
        token: { type: string, example: "eyJhbGciOiJIUzI1Ni..." }

    # ── Datos de Clima (Sincronizados con el código) ───────────────────────────
    Ciudad:
      type: object
      required: [nombre]
      properties:
        id: { type: integer, format: int64, readOnly: true, example: 1 }
        nombre: { type: string, example: "Sevilla" }
        latitud: { type: number, format: double, example: 37.38 }
        longitud: { type: number, format: double, example: -5.98 }

    WeatherDTO:
      type: object
      description: Datos climáticos devueltos por weatherService.obtenerClimaPorCoordenadas
      properties:
        temperatura: { type: number, example: 22.5 }
        descripcion: { type: string, example: "cielo claro" }
        humedad: { type: integer, example: 45 }
        vientoVelocidad: { type: number, example: 12.5 }

    UsuarioResponse:
      type: object
      properties:
        firstName: { type: string, example: Alice }
        lastName: { type: string, example: Johnson }
        email: { type: string, example: alice.johnson@example.com }
        rol: { type: string, example: ROLE_USER }

# ──────────────────────────────────────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────────────────────────────────────
paths:
  # ── AUTH ───────────────────────────────────────────────────────────────────
  /api/v1/auth/signin:
    post:
      tags: [Auth]
      summary: Login - obtención de JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SigninRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JwtAuthenticationResponse" }

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Registro de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignUpRequest" }
      responses:
        "200":
          description: OK

  # ── CLIMA (WeatherController) ──────────────────────────────────────────────
  /api/clima/ciudades:
    get:
      tags: [Meteorologia]
      summary: Obtener el listado de ciudades guardadas
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Lista de ciudades devuelta correctamente
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Ciudad" }

    post:
      tags: [Meteorologia]
      summary: Agregar una nueva ciudad a la lista
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Ciudad" }
      responses:
        "200":
          description: Ciudad agregada correctamente
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ciudad" }

  /api/clima/ciudades/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    put:
      tags: [Meteorologia]
      summary: Actualizar una ciudad existente
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Ciudad" }
      responses:
        "200":
          description: Ciudad actualizada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ciudad" }
    delete:
      tags: [Meteorologia]
      summary: Eliminar una ciudad
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Éxito (No Content)

  /api/clima/hoy:
    get:
      tags: [Meteorologia]
      summary: Obtener el clima actual por coordenadas
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number, format: double }
          example: 37.38
        - in: query
          name: lon
          required: true
          schema: { type: number, format: double }
          example: -5.98
      responses:
        "200":
          description: Datos del clima obtenidos
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeatherDTO" }

  # ── USERS ──────────────────────────────────────────────────────────────────
  /api/v1/users:
    get:
      tags: [Users]
      summary: Listar todos los usuarios (Solo ADMIN)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UsuarioResponse" }