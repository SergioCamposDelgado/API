openapi: 3.0.3
info:
  title: API de Datos Meteorológicos
  version: "1.2.0"
  description: >
    API educativa con Spring Boot, JWT y control de acceso por roles (ROLE_USER, ROLE_ADMIN).
    Spec alineado con los DTOs reales del backend:
    - SignUpRequest       : firstName, lastName, email, password
    - SigninRequest       : email, password
    - UsuarioResponse    : firstName, lastName, email, rol (string singular)
    - ErrorDetailsResponse: timestamp, message, details
    - POST /auth/signup  -> 200 + JWT
    - POST /weather      -> 200 + DatoMeteorologico
    - DELETE /weather/{id}-> 200 sin body

servers:
  - url: http://localhost:9091
    description: Local

tags:
  - name: Auth
    description: Autenticación y registro de usuarios
  - name: Meteorologia
    description: CRUD de datos meteorológicos — lectura requiere USER/ADMIN, escritura requiere ADMIN
  - name: Users
    description: Gestión/listado de usuarios (solo ADMIN)
  - name: Resources
    description: Recurso protegido de ejemplo

# ──────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Error ──────────────────────────────────────────────────────────────────
    # Refleja exactamente: ErrorDetailsResponse(Date timestamp, String message, String details)
    ErrorDetailsResponse:
      type: object
      required: [timestamp, message, details]
      properties:
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora del error (java.util.Date serializado como ISO-8601)
          example: "2026-02-19T18:20:30.123+00:00"
        message:
          type: string
          description: Descripción corta del error
          example: "Unauthorized"
        details:
          type: string
          description: Información adicional, normalmente la URI de la petición
          example: "uri=/api/v1/weather"

    # ── Auth ───────────────────────────────────────────────────────────────────
    SigninRequest:
      type: object
      description: Credenciales para obtener un JWT.
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice.johnson@example.com
        password:
          type: string
          example: password123

    SignUpRequest:
      type: object
      description: Datos de registro de un nuevo usuario. El backend asigna ROLE_USER por defecto.
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
          example: Alice
        lastName:
          type: string
          example: Johnson
        email:
          type: string
          format: email
          example: alice.johnson@example.com
        password:
          type: string
          example: password123

    JwtAuthenticationResponse:
      type: object
      description: Respuesta devuelta en signin y signup con el JWT generado.
      required: [token]
      properties:
        token:
          type: string
          description: JWT Bearer token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhbGljZS5qb2huc29uQGV4YW1wbGUuY29tIiwicm9sZXMiOlsiUk9MRV9VU0VSIl0sImlhdCI6MTcwODM2OTQwMCwiZXhwIjoxNzA4MzczMDAwfQ.signature"

    # ── Meteorología ───────────────────────────────────────────────────────────
    DatoMeteorologico:
      type: object
      description: Dato meteorológico persistido devuelto por el servidor. El id lo asigna el servidor.
      required: [id, ciudad, temperatura, estado]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        ciudad:
          type: string
          example: Sevilla
        temperatura:
          type: number
          format: float
          example: 22.5
        humedad:
          type: integer
          example: 45
        estado:
          type: string
          description: Descripción del clima (Soleado, Nublado, etc.)
          example: "Soleado"

    MeteorologiaWriteRequest:
      type: object
      description: >
        Cuerpo para crear (POST) o actualizar (PUT) un dato meteorológico.
        El id no se incluye; en PUT se obtiene del path.
      required: [ciudad, temperatura, estado]
      properties:
        ciudad:
          type: string
          example: Sevilla
        temperatura:
          type: number
          example: 22.5
        estado:
          type: string
          example: "Soleado"

    # ── Spring Data Page ───────────────────────────────────────────────────────
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean

    PageableObject:
      type: object
      properties:
        pageNumber:
          type: integer
        pageSize:
          type: integer
        offset:
          type: integer
          format: int64
        paged:
          type: boolean
        unpaged:
          type: boolean
        sort:
          $ref: "#/components/schemas/SortObject"

    PageMeteorologia:
      type: object
      description: Respuesta paginada de Spring Data (Page<DatoMeteorologico>).
      required: [content, number, size, totalElements, totalPages, first, last, empty]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/DatoMeteorologico"
        pageable:
          $ref: "#/components/schemas/PageableObject"
        sort:
          $ref: "#/components/schemas/SortObject"
        number:
          type: integer
          description: Página actual (0-based)
          example: 0
        size:
          type: integer
          example: 10
        numberOfElements:
          type: integer
          example: 10
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 5
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false
        empty:
          type: boolean
          example: false

    # ── Users ──────────────────────────────────────────────────────────────────
    # Refleja exactamente: UsuarioResponse(String firstName, String lastName, String email, String rol)
    UsuarioResponse:
      type: object
      required: [firstName, lastName, email, rol]
      properties:
        firstName:
          type: string
          example: Alice
        lastName:
          type: string
          example: Johnson
        email:
          type: string
          format: email
          example: alice.johnson@example.com
        rol:
          type: string
          description: Rol asignado al usuario (campo singular string, no array)
          example: ROLE_USER

# ──────────────────────────────────────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────────────────────────────────────
paths:

  # ── AUTH ───────────────────────────────────────────────────────────────────
  /api/v1/auth/signin:
    post:
      tags: [Auth]
      summary: Login — obtención de JWT
      operationId: signin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "200":
          description: JWT generado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwtAuthenticationResponse"
        "401":
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetailsResponse"

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Registro de nuevo usuario
      operationId: signup
      description: >
        Crea un usuario con ROLE_USER y devuelve un JWT directamente.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "200":
          description: Usuario registrado — devuelve JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwtAuthenticationResponse"

  # ── METEOROLOGÍA (colección) ───────────────────────────────────────────────
  /api/v1/weather:
    get:
      tags: [Meteorologia]
      summary: Listado paginado de datos meteorológicos
      operationId: listMeteorologia
      description: Requiere ROLE_USER o ROLE_ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          description: Número de página (0-based)
          schema:
            type: integer
            default: 0
        - in: query
          name: size
          description: Elementos por página.
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Página de datos meteorológicos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageMeteorologia"

    post:
      tags: [Meteorologia]
      summary: Crear registro meteorológico
      operationId: createMeteorologia
      description: Requiere ROLE_ADMIN.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeteorologiaWriteRequest"
      responses:
        "200":
          description: Dato creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatoMeteorologico"

  # ── METEOROLOGÍA (recurso individual) ──────────────────────────────────────
  /api/v1/weather/{id}:
    parameters:
      - in: path
        name: id
        required: true
        description: ID del dato meteorológico
        schema:
          type: integer
          format: int64
          example: 1

    get:
      tags: [Meteorologia]
      summary: Obtener dato meteorológico por ID
      operationId: getMeteorologiaById
      description: Requiere ROLE_USER o ROLE_ADMIN.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dato encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatoMeteorologico"
        "404":
          description: No encontrado

    put:
      tags: [Meteorologia]
      summary: Actualizar dato meteorológico
      operationId: updateMeteorologia
      description: Requiere ROLE_ADMIN.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeteorologiaWriteRequest"
      responses:
        "200":
          description: Dato actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatoMeteorologico"

    delete:
      tags: [Meteorologia]
      summary: Eliminar registro meteorológico
      operationId: deleteMeteorologia
      description: Requiere ROLE_ADMIN.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registro eliminado correctamente

  # ── USERS ──────────────────────────────────────────────────────────────────
  /api/v1/users:
    get:
      tags: [Users]
      summary: Listar todos los usuarios
      operationId: listUsers
      description: Requiere ROLE_ADMIN.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsuarioResponse"

  # ── RESOURCES ──────────────────────────────────────────────────────────────
  /api/v1/resources:
    get:
      tags: [Resources]
      summary: Recurso protegido de ejemplo
      operationId: getProtectedResource
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recurso devuelto correctamente
          content:
            text/plain:
              schema:
                type: string
                example: "Recurso protegido OK"